<!doctype html>
<html lang="id">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Belajar Go (Golang) - Interaktif</title>
  <link rel="stylesheet" href="assets/style.css">
  <!-- Prism for syntax highlighting -->
  <link href="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/themes/prism-tomorrow.min.css" rel="stylesheet" />
</head>
<body>
  <div class="container">
    <aside class="sidebar">
      <h2>Topik</h2>
      <ul id="topicsList"></ul>
    </aside>

    <main class="main">
      <div class="controls">
        <a href="https://github.com/herusdianto/golang-resume" class="github-link" target="_blank" rel="noopener noreferrer" title="GitHub Repository">
          <svg viewBox="0 0 16 16" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path fill-rule="evenodd" clip-rule="evenodd" d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.01.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27.68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.11.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.19 0 .21.15.46.55.38A8.013 8.013 0 0 0 16 8c0-4.42-3.58-8-8-8z" fill="currentColor"/>
          </svg>
        </a>

        <button id="themeToggle" class="theme-toggle-btn" aria-label="Toggle theme">
          <span id="theme-icon"></span>
        </button>
      </div>

      <header>
        <h1 id="topicTitle">Belajar Go</h1>
        <p id="topicDesc">Pilih topik di kiri untuk melihat contoh dan bereksperimen.</p>
      </header>

      <section class="editorPanel">
        <div class="editorActions">
          <button id="copyBtn">Copy</button>
          <button id="downloadBtn">Download .go</button>
          <button id="playgroundBtn">Buka di Go Playground</button>
          <button id="typesRefBtn">Referensi Tipe Data</button>
        </div>

        <div class="preview">
          <pre class="language-go"><code id="highlightedCode" class="language-go"></code></pre>
        </div>

        <!-- form untuk submit ke Go Playground (fallback via POST) -->
        <form id="playForm" method="post" action="https://play.golang.org/" target="_blank" style="display:none;">
          <textarea name="body" id="playBody"></textarea>
        </form>

        <aside class="localRun">
          <h4>Instruksi jalankan lokal</h4>
          <ol>
            <li>Klik "Download .go" atau salin kode.</li>
            <li>Simpan sebagai <code>nama.go</code>, lalu di terminal jalankan:</li>
            <pre>go run nama.go</pre>
            <li>Jika belum install Go: https://go.dev/dl</li>
          </ol>
        </aside>
      </section>

      <!-- TYPES REFERENCE: akan diisi oleh app.js -->
      <section id="typesRef" class="types-ref" aria-label="Referensi Tipe Data"></section>

      <!-- PRINTF REFERENCE: akan diisi oleh app.js -->
      <section id="printfRef" class="types-ref" aria-label="Referensi fmt.Printf"></section>

    </main>
  </div>

  <!-- Prism core (theme above). The language component for Go is loaded dynamically by app.js if Prism is available. -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/prism.min.js"></script>
  <script src="assets/app.js"></script>
</body>
</html>
