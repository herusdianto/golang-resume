<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64" role="img" aria-label="Go playground favicon">
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#06b6d4"/>
      <stop offset="50%" stop-color="#60a5fa"/>
      <stop offset="100%" stop-color="#2563eb"/>
    </linearGradient>
  </defs>

  <!-- rounded square background -->
  <rect width="64" height="64" rx="12" fill="url(#bg)" />

  <!-- code icon: left chevron, right chevron, and slash -->
  <g transform="translate(12,12) scale(0.8)" fill="none" stroke="#ffffff" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
    <!-- left chevron '<' -->
    <path d="M6 26 L0 20 L6 14"/>
    <!-- right chevron '>' -->
    <path d="M42 26 L48 20 L42 14"/>
    <!-- slash '/' in middle -->
    <path d="M22 10 L30 34"/>
  </g>

  <!-- small 'Go' label bottom-right -->
  <g transform="translate(40,40)">
    <rect x="0" y="0" width="18" height="12" rx="3" fill="rgba(255,255,255,0.12)" />
    <text x="9" y="7" text-anchor="middle" alignment-baseline="middle" font-family="Inter, Arial, sans-serif" font-size="8" fill="#ffffff" font-weight="600">Go</text>
  </g>
</svg>
